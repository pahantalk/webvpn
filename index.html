<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Web VPN - Обход блокировок</title>
    <style>
        body {
            font-family: sans-serif;
            background: #0a0a0f;
            color: #fff;
            padding: 20px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
        }
        input {
            width: 60%;
            background: #1a1a1f;
            border: 1px solid #333;
            color: #fff;
        }
        button {
            background: #667eea;
            border: none;
            cursor: pointer;
        }
        .proxy-btn {
            background: #2a2a2f;
            margin: 3px;
        }
        .active {
            background: #667eea;
        }
        iframe {
            width: 100%;
            height: 70vh;
            margin-top: 20px;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .status {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
        }
        .status-loading { background: #ffaa33; color: #000; }
        .status-success { background: #4caf50; }
        .status-error { background: #f44336; }
    </style>
</head>
<body>
    <h1>🚀 WEB VPN</h1>
    <p>🌐 Ваш IP: <span id="ip">загрузка...</span></p>
    
    <input type="text" id="url" placeholder="google.com или любой другой сайт">
    <button onclick="openUrl()">🔓 ОТКРЫТЬ ЧЕРЕЗ VPN</button>
    <button onclick="clearIframe()">🗑️ ОЧИСТИТЬ</button>
    
    <div>
        <button class="proxy-btn" data-proxy="https://api.allorigins.win/raw?url=" onclick="setProxy(this)">🔄 All Origins</button>
        <button class="proxy-btn" data-proxy="https://cors-proxy.xyz/?url=" onclick="setProxy(this)">⚡ CORS Proxy XYZ</button>
        <button class="proxy-btn" data-proxy="https://proxy.cors.workers.dev/?url=" onclick="setProxy(this)">🚀 Workers Proxy</button>
        <button class="proxy-btn" data-proxy="https://cors.abstractapi.com/v1/?url=" onclick="setProxy(this)">📡 Abstract API</button>
    </div>
    
    <div id="status" class="status"></div>
    
    <iframe id="frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
    
    <script>
        let currentProxy = 'https://api.allorigins.win/raw?url=';
        
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(d => document.getElementById('ip').innerText = d.ip)
            .catch(() => document.getElementById('ip').innerText = 'не определен');
        
        function setProxy(btn) {
            currentProxy = btn.getAttribute('data-proxy');
            document.querySelectorAll('.proxy-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            showStatus('✅ Прокси выбран: ' + btn.innerText, 'success');
        }
        
        function showStatus(msg, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = msg;
            statusDiv.className = 'status status-' + type;
            setTimeout(() => {
                if (statusDiv.innerHTML === msg) {
                    statusDiv.innerHTML = '';
                    statusDiv.className = 'status';
                }
            }, 3000);
        }
        
        async function openUrl() {
            let url = document.getElementById('url').value.trim();
            if (!url) {
                alert('Введите URL');
                return;
            }
            
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            
            const iframe = document.getElementById('frame');
            
            showStatus('🔄 Открываю через VPN...', 'loading');
            
            let proxyUrl;
            if (currentProxy.includes('allorigins')) {
                proxyUrl = currentProxy + encodeURIComponent(url);
            } else {
                proxyUrl = currentProxy + encodeURIComponent(url);
            }
            
            iframe.src = proxyUrl;
            
            iframe.onload = () => {
                showStatus('✅ Успешно открыто: ' + url, 'success');
            };
            
            iframe.onerror = () => {
                showStatus('❌ Ошибка. Попробуйте другой прокси или сайт', 'error');
            };
            
            setTimeout(() => {
                try {
                    if (iframe.contentDocument && iframe.contentDocument.title === '') {
                        showStatus('⚠️ Долгая загрузка. Возможно, нужно сменить прокси', 'loading');
                    }
                } catch(e) {}
            }, 10000);
        }
        
        function clearIframe() {
            document.getElementById('frame').src = '';
            document.getElementById('url').value = '';
            document.getElementById('status').innerHTML = '';
            showStatus('🧹 Очищено', 'success');
        }
        
        document.getElementById('url').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') openUrl();
        });
        
        // Подсветка первого прокси
        document.querySelector('.proxy-btn').classList.add('active');
    </script>
</body>
</html>
