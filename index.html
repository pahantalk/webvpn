<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web VPN - Обход блокировок</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 40px 0; }
        .header h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .url-input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
        }
        .btn-danger { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); }
        .iframe-container { margin-top: 20px; border-radius: 10px; overflow: hidden; background: #fff; }
        iframe { width: 100%; height: 70vh; border: none; }
        .status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .proxy-item {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .footer { text-align: center; padding: 30px; color: #666; font-size: 12px; }
        @media (max-width: 600px) {
            .container { padding: 10px; }
            .header h1 { font-size: 32px; }
            iframe { height: 60vh; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 WEB VPN</h1>
            <p>Обход блокировок через браузер | Бесплатно</p>
        </div>
        <div class="card">
            <div style="margin-bottom: 15px;">
                <span class="status"></span>
                <span id="statusText">Сервер активен</span>
                <span style="float: right;">🌐 IP: <span id="currentIp">загрузка...</span></span>
            </div>
            <input type="text" id="urlInput" class="url-input" placeholder="Введите URL (например, google.com)">
            <button class="btn" onclick="goToUrl()">🔓 ОТКРЫТЬ</button>
            <button class="btn btn-danger" onclick="clearIframe()">🗑️ ОЧИСТИТЬ</button>
            <div class="proxy-list">
                <div class="proxy-item" onclick="setProxy('https://cors-anywhere.herokuapp.com/')">🌍 CORS Anywhere</div>
                <div class="proxy-item" onclick="setProxy('https://api.allorigins.win/raw?url=')">🔄 All Origins</div>
                <div class="proxy-item" onclick="setProxy('https://corsproxy.io/?')">⚡ CORS Proxy IO</div>
            </div>
        </div>
        <div id="iframeContainer" class="iframe-container" style="display: none;">
            <iframe id="contentFrame"></iframe>
        </div>
        <div class="footer">🔒 Анонимный доступ | Не сохраняем историю | Обход блокировок</div>
    </div>
    <script>
        let currentProxy = 'https://cors-anywhere.herokuapp.com/';
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => document.getElementById('currentIp').innerText = data.ip)
            .catch(() => document.getElementById('currentIp').innerText = 'не определен');
        function setProxy(proxy) { currentProxy = proxy; alert('Прокси выбран: ' + proxy); }
        function goToUrl() {
            let url = document.getElementById('urlInput').value.trim();
            if (!url) { alert('Введите URL'); return; }
            if (!url.startsWith('http')) { url = 'https://' + url; }
            document.getElementById('iframeContainer').style.display = 'block';
            document.getElementById('contentFrame').src = currentProxy + encodeURIComponent(url);
            document.getElementById('statusText').innerHTML = 'Подключено к ' + url;
        }
        function clearIframe() {
            document.getElementById('contentFrame').src = '';
            document.getElementById('iframeContainer').style.display = 'none';
            document.getElementById('statusText').innerHTML = 'Сервер активен';
            document.getElementById('urlInput').value = '';
        }
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') goToUrl();
        });
    </script>
</body>
</html>
